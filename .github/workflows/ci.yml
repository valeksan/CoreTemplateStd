name: CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'core.h'
      - 'example/**'
      - 'qt_adapter/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'core.h'
      - 'example/**'
      - 'qt_adapter/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build/ci
          -DCMAKE_BUILD_TYPE=Release
          -DCORETEMPLATE_BUILD_TESTS=ON
          -DCORETEMPLATE_BUILD_EXAMPLE=ON

      - name: Build
        run: cmake --build build/ci --config Release

      - name: Run tests
        run: ctest --test-dir build/ci --build-config Release --output-on-failure

      - name: Run console example
        run: ./build/ci/example/ExampleConsoleApp
        if: runner.os != 'Windows'

      - name: Run console example on Windows
        run: .\build\ci\example\Release\ExampleConsoleApp.exe
        if: runner.os == 'Windows'

      - name: Install package
        run: >
          cmake --install build/ci
          --config Release
          --prefix build/install

      - name: Configure package smoke consumer
        run: >
          cmake -S tests/package_smoke -B build/package_smoke
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/install

      - name: Build package smoke consumer
        run: cmake --build build/package_smoke --config Release

      - name: Run package smoke consumer
        run: ctest --test-dir build/package_smoke --build-config Release --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure sanitizer build
        run: >
          cmake -S . -B build/sanitizers
          -DCMAKE_BUILD_TYPE=Debug
          -DCORETEMPLATE_BUILD_TESTS=ON
          -DCORETEMPLATE_BUILD_EXAMPLE=ON
          -DCORETEMPLATE_ENABLE_SANITIZERS=ON

      - name: Build sanitizer targets
        run: cmake --build build/sanitizers

      - name: Run sanitizer tests
        run: ctest --test-dir build/sanitizers --output-on-failure

      - name: Run sanitizer console example
        run: ./build/sanitizers/example/ExampleConsoleApp

  qt_adapter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev

      - name: Configure Qt adapter build
        run: >
          cmake -S . -B build/qt_adapter
          -DCMAKE_BUILD_TYPE=Release
          -DCORETEMPLATE_BUILD_TESTS=ON
          -DCORETEMPLATE_BUILD_EXAMPLE=OFF
          -DCORETEMPLATE_BUILD_QT_ADAPTER=ON

      - name: Build Qt adapter targets
        run: cmake --build build/qt_adapter --config Release

      - name: Run Qt adapter tests
        run: ctest --test-dir build/qt_adapter --build-config Release --output-on-failure
